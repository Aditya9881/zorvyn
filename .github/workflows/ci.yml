# ═══════════════════════════════════════════════════════════════
# Zorvyn CI Pipeline
#
# Triggers on push to main/develop and PRs to main.
# Jobs:
#   1. test — npm ci + npm test (116+ tests)
#   2. docker-build — build image + smoke test health endpoint
# ═══════════════════════════════════════════════════════════════

name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  docker-build:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t zorvyn-api:ci .

      - name: Smoke test container
        run: |
          docker run -d --name zorvyn-smoke \
            -p 3000:3000 \
            -e ACCESS_TOKEN_SECRET=ci-test-secret \
            -e REFRESH_TOKEN_SECRET=ci-test-secret \
            zorvyn-api:ci
          echo "Waiting for container to start..."
          sleep 5
          curl -f http://localhost:3000/api/v1/health
          echo ""
          echo "✅ Health check passed!"
          docker stop zorvyn-smoke
